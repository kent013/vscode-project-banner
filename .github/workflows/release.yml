name: Release VSIX

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - name: Package VSIX
        run: npm run dist

      - name: Create GitHub Release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-project-banner-*.vsix
          generate_release_notes: true
